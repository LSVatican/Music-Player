<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - Music Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>Unggah MP3</h1>
        <div class="card" style="flex-direction: column; gap: 15px;">
            <input type="file" id="file-input" accept=".mp3" style="color: white;">
            <div id="file-info" style="font-size: 14px; color: var(--pink);"></div>
            
            <div class="progress-container" style="height: 15px; border-radius: 10px;">
                <div class="progress-bar" id="upload-progress" style="border-radius: 10px;"></div>
            </div>
            
            <button onclick="handleUpload()" class="btn">Mulai Unggah</button>
            <a href="index.html" style="color: white; font-size: 14px;">Kembali</a>
        </div>
    </div>
    <div class="watermark">LS Vatican</div>
    <script src="script.js"></script>
</body>
</html>
