<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>Music Player</h1>
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="upload.html" class="btn">Unggah Musik</a>
        </div>
        <div id="music-list"></div>
    </div>

    <div class="watermark">LS Vatican</div>

    <div id="player-bar">
        <div id="current-title" style="font-size: 14px; margin-bottom: 5px;">Memutar...</div>
        <div class="progress-container">
            <div class="progress-bar" id="audio-progress"></div>
        </div>
        <div style="display: flex; gap: 20px; margin-top: 10px; justify-content: center;">
            <button onclick="togglePlay()" class="btn" id="play-btn">Pause</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
